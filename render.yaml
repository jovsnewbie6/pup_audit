# Render Deployment Configuration

This web service is configured for deployment on Render.com

## Environment Variables Required

```
DATABASE_URL=postgresql://user:password@your-neon-endpoint.aws.neon.tech/database_name?sslmode=require
JWT_SECRET=your_super_secret_key_here
NODE_ENV=production
PORT=10000
```

## Build & Start Commands

**Build Command:**
```
npm install
```

**Start Command:**
```
node server.js
```

## Notes

- Neon PostgreSQL database ensures data persistence (won't be deleted after 30 days)
- Free tier is sufficient for small team usage
- Paid tiers available for scaling
- Render automatically manages deployments from GitHub

## First Run

When the app first runs, it will:
1. Connect to your Neon database
2. Create all necessary tables
3. Create default admin user (Admin / Admin123)
4. Set up default permissions for roles

**Important:** Change the admin password immediately after first login!
