<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUP Audit - Reimbursement & Liquidation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h2 class="logo">PUP Audit</h2>
            <nav>
                <ul class="nav-links">
                    <li class="active" onclick="switchTab('Reimbursement', this)">Reimbursements</li>
                    <li onclick="switchTab('Liquidation', this)">Liquidations</li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1 id="pageTitle">Reimbursements</h1>
                <p>Search and review submitted cases</p>
            </header>
            
            <button id="addNewBtn" onclick="openAddModal()">+ Add New Record</button>

            <section class="search-section">
                <input type="text" id="searchInput" placeholder="Search by Case Name...">
                <input type="date" id="dateInput">
                <button id="searchBtn" onclick="searchCases()">Search</button>
            </section>

            <section class="results-section" id="resultsContainer">
                </section>
        </main>
    </div>

    <div id="fileModal" class="modal">
        <div class="modal-content file-modal-layout">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            
            <div class="file-viewer-section">
                <h2 id="modalTitle">Case Details</h2>
                <div id="fileViewer">
                    <iframe id="documentFrame" src="" width="100%" height="500px" style="border: none; background: #eee;"></iframe>
                </div>
            </div>

            <div class="comments-section">
                <h3>Audit Comments</h3>
                <div id="commentsList" class="comments-list">
                    </div>
                <form id="commentForm" onsubmit="submitComment(event)">
                    <input type="text" id="newCommentText" placeholder="Add a finding or comment..." required>
                    <button type="submit">Post</button>
                </form>
            </div>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAddModal()">&times;</span>
            <h2>Submit New Record</h2>
            <form id="addRecordForm" onsubmit="submitNewRecord(event)">
                <div class="form-group">
                    <label for="newName">Case Name / Description:</label>
                    <input type="text" id="newName" required placeholder="e.g., Q3 Travel Allowance">
                </div>
                <div class="form-group">
                    <label for="newDate">Submission Date:</label>
                    <input type="date" id="newDate" required>
                </div>
                <div class="form-group">
                    <label for="newSummary">Summary / Notes:</label>
                    <textarea id="newSummary" rows="4" required placeholder="Brief description of the expenses..."></textarea>
                </div>
                <div class="form-group">
                    <label for="newFile">Upload Document (PDF/Image):</label>
                    <input type="file" id="newFile" accept=".pdf, image/*" required>
                </div>
                <button type="submit" class="submit-btn">Submit Case</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
